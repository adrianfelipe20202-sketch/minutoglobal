<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background: #222;
  }
  .cover {
    width: 1640px;
    height: 624px;
    background: linear-gradient(135deg, #0a1628 0%, #0d1f3c 30%, #1a2d50 60%, #0d47a1 100%);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 80px;
  }

  /* Grid de fondo */
  .grid {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Línea roja horizontal */
  .red-line {
    position: absolute;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(to right, transparent, #f44336 20%, #f44336 80%, transparent);
  }
  .red-line.top { top: 80px; }
  .red-line.bottom { bottom: 80px; }

  /* Barra lateral roja */
  .red-bar {
    position: absolute;
    left: 0;
    top: 0;
    width: 6px;
    height: 100%;
    background: #f44336;
  }

  /* Puntos decorativos tipo mapa */
  .map-dot {
    position: absolute;
    width: 6px;
    height: 6px;
    background: rgba(244,67,54,0.4);
    border-radius: 50%;
  }
  .map-dot::after {
    content: '';
    position: absolute;
    top: -4px; left: -4px;
    width: 14px; height: 14px;
    border: 1px solid rgba(244,67,54,0.2);
    border-radius: 50%;
  }
  .map-dot:nth-child(1) { top: 120px; left: 200px; }
  .map-dot:nth-child(2) { top: 200px; left: 450px; }
  .map-dot:nth-child(3) { top: 350px; left: 300px; }
  .map-dot:nth-child(4) { top: 150px; right: 400px; }
  .map-dot:nth-child(5) { top: 400px; right: 200px; }
  .map-dot:nth-child(6) { top: 280px; right: 550px; }
  .map-dot:nth-child(7) { top: 450px; left: 600px; }
  .map-dot:nth-child(8) { top: 100px; right: 250px; }

  /* Globo decorativo */
  .globe {
    position: absolute;
    right: -50px;
    top: 50%;
    transform: translateY(-50%);
    width: 500px;
    height: 500px;
    border: 2px solid rgba(255,255,255,0.06);
    border-radius: 50%;
  }
  .globe::before {
    content: '';
    position: absolute;
    top: 50%;
    left: -10%;
    width: 120%;
    height: 2px;
    background: rgba(255,255,255,0.04);
    transform: translateY(-50%);
  }
  .globe::after {
    content: '';
    position: absolute;
    top: -10%;
    left: 50%;
    width: 2px;
    height: 120%;
    background: rgba(255,255,255,0.04);
    transform: translateX(-50%);
  }
  .globe-inner {
    position: absolute;
    right: 75px;
    top: 50%;
    transform: translateY(-50%);
    width: 350px;
    height: 350px;
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 50%;
  }

  /* Contenido */
  .left {
    position: relative;
    z-index: 10;
  }
  .brand {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-weight: 900;
    font-size: 90px;
    color: #ffffff;
    letter-spacing: 4px;
    text-transform: uppercase;
    line-height: 1;
  }
  .brand span {
    color: #f44336;
  }
  .slogan {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 20px;
    color: rgba(255,255,255,0.6);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 15px;
    border-left: 3px solid #f44336;
    padding-left: 15px;
  }
  .tags {
    display: flex;
    gap: 15px;
    margin-top: 30px;
  }
  .tag {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 16px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 3px;
  }

  /* Lado derecho - hora en vivo */
  .right {
    position: relative;
    z-index: 10;
    text-align: right;
  }
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    color: #f44336;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .live-dot {
    width: 10px;
    height: 10px;
    background: #f44336;
    border-radius: 50%;
  }
  .time-24 {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 48px;
    font-weight: 300;
    color: rgba(255,255,255,0.3);
    letter-spacing: 5px;
  }
  .emoji-globe {
    font-size: 120px;
    opacity: 0.15;
    position: absolute;
    right: 100px;
    bottom: 50px;
  }
</style>
</head>
<body>
  <div class="cover">
    <div class="grid"></div>
    <div class="red-line top"></div>
    <div class="red-line bottom"></div>
    <div class="red-bar"></div>

    <div class="map-dot"></div>
    <div class="map-dot"></div>
    <div class="map-dot"></div>
    <div class="map-dot"></div>
    <div class="map-dot"></div>
    <div class="map-dot"></div>
    <div class="map-dot"></div>
    <div class="map-dot"></div>

    <div class="globe"></div>
    <div class="globe-inner"></div>

    <div class="left">
      <div class="brand">MINUTO<span>.</span></div>
      <div class="brand">GLOBAL</div>
      <div class="slogan">La noticia satisfactoria al alcance de tus manos</div>
      <div class="tags">
        <div class="tag">Colombia</div>
        <div class="tag">Mundo</div>
        <div class="tag">24/7</div>
        <div class="tag">Tiempo Real</div>
      </div>
    </div>

    <div class="right">
      <div class="live-badge">
        <div class="live-dot"></div>
        EN VIVO
      </div>
      <div class="time-24">24 / 7</div>
    </div>

    <div class="emoji-globe">🌐</div>
  </div>
</body>
</html>
